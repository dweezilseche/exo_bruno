name: Auto Build Dist

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/auto-build-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Commit generated dist files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build dist assets"
          file_pattern: dist/*
